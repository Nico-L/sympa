services:
  sympa-db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sympa}
      MYSQL_USER: ${MYSQL_USER:-sympa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - sympa-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  sympa:
    image: ghcr.io/nico-l/sympa:latest
    restart: unless-stopped
    depends_on:
      sympa-db:
        condition: service_healthy
    environment:
      SYMPA_DOMAIN: ${SYMPA_DOMAIN}
      SYMPA_LISTMASTERS: ${SYMPA_LISTMASTERS}
      SYMPA_DB_HOST: sympa-db
      SYMPA_DB_NAME: ${MYSQL_DATABASE:-sympa}
      SYMPA_DB_USER: ${MYSQL_USER:-sympa}
      SYMPA_DB_PASS: ${MYSQL_PASSWORD}
      MAILJET_API_KEY: ${MAILJET_API_KEY}
      MAILJET_SECRET_KEY: ${MAILJET_SECRET_KEY}
    volumes:
      - sympa-etc:/etc/sympa
      - sympa-lib:/var/lib/sympa
      - sympa-spool:/var/spool/sympa
      - sympa-postfix:/var/spool/postfix
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sympa.rule=Host(`${SYMPA_DOMAIN}`)"
      - traefik.http.routers.sympa.entryPoints=https
      - traefik.http.routers.sympa.tls=true
      - traefik.http.routers.sympa.tls.certresolver=letsencrypt
      - traefik.http.services.sympa.loadbalancer.server.port=80

volumes:
  sympa-db-data:
  sympa-etc:
  sympa-lib:
  sympa-spool:
  sympa-postfix:
